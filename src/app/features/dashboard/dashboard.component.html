<section class="space-y-8">
    <!-- Greeting -->
     <div>
        <h1 class="text-2xl font-semibold">
            Good evening, Rashmi👋
        </h1>
        <p class="text-sm text-neutral-500 dark:text-neutral-400">
            Here's a quick overview of your tasks
        </p>
     </div>

     <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div *ngFor="let stat of stats" class="bg-white dark:bg-neutral-800 rounded-2xl p-6 shadow-sm hover:shadow-md transition">
            <div class="flex items-center justify-between">
                <span class="text-3xl">{{ stat.icon }}</span>
                <span class="text-3xl font-semibold">{{ stat.value }}</span>
            </div>
            <p class="mt-4 text-sm text-neutral-500 dark:text-neutral-400"> 
                {{ stat.label}}
            </p>
        </div>
      </div>

      <!-- Task list placeholder -->
    
</section>
